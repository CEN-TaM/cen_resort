<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회사 휴양소 정보 및 후기</title>
  <style>
    :root {
      --bg: #f4fbff;
      --card: #ffffff;
      --primary: #31a7e8;
      --primary-dark: #1688c5;
      --mint: #42d8c4;
      --soft-blue: #e8f7ff;
      --soft-mint: #e9fbf8;
      --text: #1e3445;
      --muted: #718493;
      --line: #e3eef5;
      --danger: #ff7b85;
      --yellow: #ffd56a;
      --shadow: 0 10px 30px rgba(27, 101, 142, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: linear-gradient(180deg, #eaf8ff 0%, #f7fcff 42%, #ffffff 100%); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; }
    body { height: 100vh; overflow: hidden; padding: 20px 0; display: flex; align-items: center; justify-content: center; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app-shell {
      width: 100%;
      max-width: 390px;
      height: 100%;
      max-height: calc(100vh - 40px);
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 28px;
      box-shadow: 0 16px 42px -10px rgba(20,80,120,.18), 0 0 0 1px rgba(20,80,120,.04);
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      animation: fadeIn .18s ease;
    }
    .screen.active { display: flex; }
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 14px 18px;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(20,80,120,0.22) transparent;
    }
    .scroll-body::-webkit-scrollbar { width: 3px; }
    .scroll-body::-webkit-scrollbar-thumb { background: rgba(20,80,120,0.22); border-radius: 999px; }
    .scroll-body::-webkit-scrollbar-track { background: transparent; }
    /* 스크롤 안내 카드 — viewport 고정 */
    .scroll-hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;width:132px;height:132px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(15,40,60,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;cursor:pointer;transition:opacity 0.3s ease,visibility 0.3s ease,transform 0.3s ease;border-radius:18px;padding:12px;text-align:center;box-shadow:0 12px 30px -10px rgba(0,0,0,0.4)}
    .scroll-hint.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:translate(-50%,calc(-50% + 8px))}
    .scroll-hint-icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;animation:swipe-up 1.6s ease-in-out infinite}
    .scroll-hint-icon svg{display:block}
    @keyframes swipe-up{0%{transform:translateY(10px);opacity:0.55}45%{transform:translateY(-8px);opacity:1}55%{transform:translateY(-8px);opacity:1}100%{transform:translateY(10px);opacity:0.55}}
    .scroll-hint-text{font-size:12px;font-weight:700;letter-spacing:-0.01em;line-height:1.35}
    .scroll-hint-sub{font-size:10px;opacity:0.7;letter-spacing:0.02em;margin-top:-2px}
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .top-area { flex-shrink: 0; z-index: 8; padding: 14px 16px 12px; background: var(--bg); border-radius: 28px 28px 0 0; border-bottom: 1px solid rgba(210,230,240,.7); }
    .brand-row, .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo { width: 38px; height: 38px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg, var(--primary), var(--mint)); color: #fff; font-size: 20px; box-shadow: var(--shadow); }
    .brand-title { margin: 0; font-size: 17px; letter-spacing: -0.04em; }
    .brand-sub { margin: 2px 0 0; color: var(--muted); font-size: 11.5px; }

    .icon-btn { width: 38px; height: 38px; border-radius: 14px; display: grid; place-items: center; background: #fff; color: var(--text); box-shadow: 0 6px 16px rgba(31, 88, 128, 0.08); font-size: 17px; }
    .back-btn { width: 40px; height: 40px; border-radius: 15px; background: #fff; display: grid; place-items: center; color: var(--text); box-shadow: 0 6px 16px rgba(31, 88, 128, 0.08); }
    .page-title { margin: 0; font-size: 17px; letter-spacing: -0.04em; flex: 1; }

    .search-wrap { margin-top: 14px; display: flex; gap: 8px; align-items: center; }
    .search-box { flex: 1; position: relative; }
    .search-box span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--muted); }
    .search-box input { width: 100%; height: 46px; border: 1px solid var(--line); background: #fff; border-radius: 18px; padding: 0 14px 0 40px; outline: 0; color: var(--text); box-shadow: 0 6px 16px rgba(31,88,128,.05); }
    .search-box input:focus { border-color: rgba(49,167,232,.55); box-shadow: 0 0 0 4px rgba(49,167,232,.11); }

    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 8px; scrollbar-width: none; }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip { flex: 0 0 auto; padding: 9px 12px; border-radius: 999px; background: #fff; color: var(--muted); border: 1px solid var(--line); font-size: 13px; box-shadow: 0 5px 14px rgba(31,88,128,.04); }
    .chip.active { background: linear-gradient(135deg, var(--primary), var(--mint)); color: #fff; border-color: transparent; font-weight: 700; }
    .chip.small { padding: 7px 10px; font-size: 12px; }

    .section { margin-top: 20px; }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .section-title { margin: 0; font-size: 15px; letter-spacing: -0.04em; }
    .section-desc { margin: 4px 0 0; color: var(--muted); font-size: 11.5px; }
    .link-btn { background: transparent; color: var(--primary-dark); font-size: 12.5px; font-weight: 700; padding: 6px; }

    .hero-card { border-radius: 28px; overflow: hidden; color: #fff; background: linear-gradient(135deg, rgba(26,148,220,.95), rgba(54,216,196,.95)); box-shadow: var(--shadow); padding: 18px; position: relative; min-height: 146px; }
    .hero-card:after { content: ""; position: absolute; width: 170px; height: 170px; right: -58px; top: -48px; border-radius: 50%; background: rgba(255,255,255,.23); }
    .hero-card:before { content: "🏖️"; position: absolute; right: 14px; bottom: 10px; font-size: 44px; filter: drop-shadow(0 10px 16px rgba(0,0,0,.12)); }
    .hero-card h2 { margin: 0 0 6px; font-size: 18px; line-height: 1.3; letter-spacing: -0.04em; position: relative; z-index: 1; }
    .hero-card p { margin: 0; width: 70%; font-size: 12px; line-height: 1.55; opacity: .92; position: relative; z-index: 1; }
    .hero-actions { display: flex; gap: 8px; margin-top: 16px; position: relative; z-index: 1; }

    .btn { min-height: 42px; border-radius: 16px; padding: 0 14px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: #fff; color: var(--text); font-weight: 800; box-shadow: 0 8px 18px rgba(31,88,128,.08); }
    .btn.primary { background: linear-gradient(135deg, var(--primary), var(--mint)); color: #fff; }
    .btn.ghost { background: rgba(255,255,255,.22); color: #fff; box-shadow: none; border: 1px solid rgba(255,255,255,.35); }
    .btn.full { width: 100%; }
    .btn.danger { color: #fff; background: linear-gradient(135deg, #ff8190, #ffad7a); }
    .btn.outline { background: #fff; border: 1px solid var(--line); color: var(--primary-dark); box-shadow: none; }
    .btn:active, .icon-btn:active, .chip:active, .back-btn:active { transform: scale(.98); }

    .h-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 2px 0 10px; scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }

    .rank-card { min-width: 150px; padding: 14px; border-radius: 22px; background: #fff; box-shadow: var(--shadow); position: relative; overflow: hidden; }
    .rank-card .rank { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 14px; display: grid; place-items: center; background: var(--soft-blue); color: var(--primary-dark); font-weight: 900; }
    .rank-card.first { background: linear-gradient(135deg, #fff7dc, #ffffff 50%); }
    .rank-icon { width: 44px; height: 44px; border-radius: 16px; display: grid; place-items: center; font-size: 22px; margin-bottom: 10px; background: linear-gradient(135deg, #e8f7ff, #e9fbf8); }
    .rank-card h3 { margin: 0 0 4px; font-size: 13.5px; letter-spacing: -0.04em; }
    .rank-card p { margin: 0; color: var(--muted); font-size: 11.5px; }

    .card { background: #fff; border: 1px solid rgba(223,237,245,.82); border-radius: var(--radius-xl); box-shadow: 0 9px 24px rgba(31,88,128,.07); overflow: hidden; }
    .card-pad { padding: 14px; }
    .mini-card { background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 12px; display: flex; gap: 12px; align-items: center; box-shadow: 0 7px 16px rgba(31,88,128,.05); }
    .mini-card + .mini-card, .review-card + .review-card, .resort-card + .resort-card { margin-top: 10px; }

    .photo { height: 130px; border-radius: 0; position: relative; overflow: hidden; background: linear-gradient(135deg, #d9f4ff, #e8fff6); }
    .photo.round { width: 74px; height: 74px; border-radius: 22px; flex: 0 0 74px; }
    .photo.tall { height: 216px; border-radius: 28px; box-shadow: var(--shadow); }
    .photo.gallery { min-width: 168px; height: 126px; border-radius: 22px; }
    .photo:before { content: attr(data-icon); position: absolute; right: 10px; bottom: 5px; font-size: 48px; filter: drop-shadow(0 8px 12px rgba(0,0,0,.12)); }
    .photo:after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 18% 18%, rgba(255,255,255,.65), transparent 24%), linear-gradient(180deg, transparent, rgba(0,0,0,.06)); }
    .sea { background: linear-gradient(135deg, #9ee7ff 0%, #64c9f4 50%, #fff2c4 100%); }
    .jeju { background: linear-gradient(135deg, #9edcff 0%, #8df0d1 50%, #ffdca8 100%); }
    .mountain { background: linear-gradient(135deg, #bbf7d0 0%, #7dd3fc 60%, #eefdf5 100%); }
    .city { background: linear-gradient(135deg, #dbeafe 0%, #c7d2fe 60%, #fff 100%); }
    .winter { background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 44%, #bae6fd 100%); }

    .resort-card { overflow: hidden; }
    .resort-card .content { padding: 13px; }
    .card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .resort-card h3, .review-card h3 { margin: 0 0 5px; font-size: 14px; letter-spacing: -0.04em; }
    .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 10px; color: var(--muted); font-size: 11.5px; }
    .desc { color: #526a7c; font-size: 12px; line-height: 1.5; margin: 8px 0 10px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--soft-blue); color: #1680bb; border: 1px solid #d7f0ff; border-radius: 999px; padding: 6px 9px; font-size: 12px; font-weight: 700; }
    .tag.mint { background: var(--soft-mint); color: #0b8f7f; border-color: #d0f6ef; }

    .review-card { padding: 12px; display: grid; grid-template-columns: 82px 1fr; gap: 12px; }
    .review-card .photo { width: 82px; height: 92px; border-radius: 20px; }
    .review-card .actions { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 2px; }
    .review-card .actions button { min-height: 36px; border-radius: 14px; background: #f6fbff; color: var(--muted); font-weight: 800; border: 1px solid var(--line); }
    .review-card .actions button.active { background: linear-gradient(135deg, rgba(49,167,232,.13), rgba(66,216,196,.18)); color: var(--primary-dark); border-color: rgba(49,167,232,.28); }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 8px; border-radius: 999px; background: #fff8dd; color: #9a6b00; font-size: 11px; font-weight: 900; }
    .badge.blue { background: var(--soft-blue); color: var(--primary-dark); }
    .badge.green { background: var(--soft-mint); color: #078b7b; }
    .badge.gray { background: #f2f6f9; color: var(--muted); }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 12px; border-radius: 20px; background: #fff; border: 1px solid var(--line); box-shadow: 0 7px 16px rgba(31,88,128,.05); }
    .stat-card strong { display: block; font-size: 19px; letter-spacing: -0.04em; }
    .stat-card span { color: var(--muted); font-size: 12px; }

    .info-grid { display: grid; grid-template-columns: 1fr; gap: 9px; }
    .info-row { display: flex; gap: 10px; align-items: flex-start; padding: 12px; border-radius: 18px; background: #fff; border: 1px solid var(--line); }
    .info-row b { display: block; font-size: 13px; margin-bottom: 3px; }
    .info-row span { color: var(--muted); font-size: 13px; line-height: 1.45; }

    .sort-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .sort-row select, .form-select, .form-input, .form-textarea { width: 100%; border: 1px solid var(--line); border-radius: 16px; background: #fff; outline: 0; color: var(--text); box-shadow: 0 5px 14px rgba(31,88,128,.04); }
    .sort-row select, .form-select, .form-input { height: 44px; padding: 0 12px; }
    .form-textarea { min-height: 128px; padding: 12px; resize: vertical; line-height: 1.55; }
    .form-label { display: block; margin: 15px 0 7px; font-size: 13px; font-weight: 900; }
    .upload-box { height: 118px; display: grid; place-items: center; text-align: center; color: var(--muted); border: 2px dashed #bfe7fb; background: #f8fdff; border-radius: 22px; }
    .radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-pill { padding: 10px 12px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-weight: 800; font-size: 13px; }
    .radio-pill.active { color: #fff; border-color: transparent; background: linear-gradient(135deg, var(--primary), var(--mint)); }

    .detail-title { margin: 12px 0 6px; font-size: 24px; letter-spacing: -0.06em; line-height: 1.25; }
    .detail-body { background: #fff; border-radius: 24px; padding: 16px; border: 1px solid var(--line); line-height: 1.72; color: #435b6d; font-size: 14px; }
    .gallery-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .gallery-row::-webkit-scrollbar { display: none; }

    .comment { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 12px; margin-top: 8px; }
    .comment-head { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .comment p { margin: 0; font-size: 13px; line-height: 1.55; }

    .bottom-nav { position: relative; width: 100%; z-index: 20; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 10px 12px 18px; background: rgba(255,255,255,.94); backdrop-filter: blur(16px); border-top: 1px solid rgba(210,230,240,.85); border-radius: 0 0 28px 28px; flex-shrink: 0; }
    .nav-item { min-height: 56px; border-radius: 18px; background: transparent; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 11px; font-weight: 800; }
    .nav-item .ico { font-size: 20px; line-height: 1; }
    .nav-item.active { color: var(--primary-dark); background: linear-gradient(135deg, rgba(49,167,232,.12), rgba(66,216,196,.14)); }

    .toast { position: fixed; left: 50%; bottom: 92px; transform: translate(-50%, 20px); min-width: 230px; max-width: 350px; padding: 13px 16px; border-radius: 18px; background: rgba(23, 47, 64, .94); color: #fff; text-align: center; font-weight: 800; z-index: 50; opacity: 0; pointer-events: none; transition: .22s ease; box-shadow: 0 12px 30px rgba(0,0,0,.18); }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .profile { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 26px; background: linear-gradient(135deg, #ffffff, #effaff); box-shadow: var(--shadow); }
    .avatar { width: 64px; height: 64px; border-radius: 24px; background: linear-gradient(135deg, var(--primary), var(--mint)); color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 20px; }
    .menu-list { background: #fff; border: 1px solid var(--line); border-radius: 24px; overflow: hidden; }
    .menu-item { width: 100%; display: flex; align-items: center; justify-content: space-between; min-height: 50px; padding: 0 14px; background: #fff; border-bottom: 1px solid #f1f6f9; color: var(--text); }
    .menu-item:last-child { border-bottom: 0; }

    .stay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stay-card { padding: 13px; border-radius: 20px; background: #fff; border: 1px solid var(--line); box-shadow: 0 7px 16px rgba(31,88,128,.05); }
    .stay-card .ico { display: inline-grid; place-items: center; width: 34px; height: 34px; border-radius: 14px; background: var(--soft-blue); margin-bottom: 8px; font-size: 18px; }
    .stay-card b { display: block; font-size: 13px; margin-bottom: 3px; }
    .stay-card span { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .stay-note { padding: 12px; border-radius: 18px; background: #fff; border: 1px solid var(--line); margin-top: 8px; color: #526a7c; font-size: 13px; line-height: 1.55; }
    .progress-row { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 12px; margin-top: 8px; }
    .progress-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; font-weight: 900; margin-bottom: 8px; }
    .progress-bar { height: 10px; border-radius: 999px; background: #edf6fb; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(135deg, var(--primary), var(--mint)); }
    .form-help { display: block; color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 5px; }

    .empty { text-align: center; padding: 32px 16px; color: var(--muted); background: #fff; border: 1px dashed #cfe5f2; border-radius: 24px; }
    .empty .big { font-size: 38px; display: block; margin-bottom: 6px; }

    @media (min-width: 431px) {
      body { background: #dfeef6; }
      .app-shell { margin-top: 0; }
    }
  </style>
</head>
<body>
  <!-- 스크롤 안내 카드 -->
  <div class="scroll-hint" id="scrollHint" role="button" aria-label="안내 닫기">
    <div class="scroll-hint-icon">
      <svg width="36" height="36" viewBox="0 0 56 56" fill="none">
        <path d="M22 16V31" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        <path d="M16 24L22 31L28 24" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
        <path d="M22 31C22 31 22 36 22 40C22 43.3137 24.6863 46 28 46H34C37.3137 46 40 43.3137 40 40V28C40 25.7909 38.2091 24 36 24C33.7909 24 32 25.7909 32 28V34" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 28C32 25.7909 30.2091 24 28 24C25.7909 24 24 25.7909 24 28V34" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24 28C24 25.7909 22.2091 24 20 24C17.7909 24 16 25.7909 16 28V34" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      </svg>
    </div>
    <div class="scroll-hint-text">스크롤 해보세요</div>
    <div class="scroll-hint-sub">탭하면 닫혀요</div>
  </div>

  <div class="app-shell">
    <main id="screen-home" class="screen active"></main>
    <main id="screen-resorts" class="screen"></main>
    <main id="screen-resort-detail" class="screen"></main>
    <main id="screen-stay-info" class="screen"></main>
    <main id="screen-reviews" class="screen"></main>
    <main id="screen-review-detail" class="screen"></main>
    <main id="screen-write" class="screen"></main>
    <main id="screen-bookmarks" class="screen"></main>
    <main id="screen-mypage" class="screen"></main>

    <nav class="bottom-nav" aria-label="하단 네비게이션">
      <button class="nav-item active" data-nav="home"><span class="ico">🏠</span>홈</button>
      <button class="nav-item" data-nav="resorts"><span class="ico">🏖️</span>휴양소</button>
      <button class="nav-item" data-nav="write"><span class="ico">✍️</span>후기작성</button>
      <button class="nav-item" data-nav="bookmarks"><span class="ico">🔖</span>북마크</button>
      <button class="nav-item" data-nav="mypage"><span class="ico">🙂</span>마이페이지</button>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

      10: { rooms: 1, bedrooms: 1, beds: '침대 없음, 바닥요 제공', bed: '없음', bathrooms: 1, cooking: '가능', kitchen: '주방, 전자레인지, 전기포트', maxGuests: '2~3인 권장', area: '약 18평형', laundry: '세탁기 있음', note: '실속형 구조로 대중교통 이용과 짧은 숙박에 편리합니다.' },
      11: { rooms: 2, bedrooms: 1, beds: '더블침대 1개 + 바닥요 2세트', bed: '있음', bathrooms: 1, cooking: '가능', kitchen: '취사도구, 전자레인지', maxGuests: '4인 권장', area: '약 24평형', laundry: '세탁기 없음', note: '스키 장비 보관과 겨울 난방을 고려한 리조트형 숙소입니다.' },
      12: { rooms: 1, bedrooms: 1, beds: '더블침대 1개', bed: '있음', bathrooms: 1, cooking: '가능', kitchen: '미니 주방, 전자레인지', maxGuests: '2~3인 권장', area: '약 20평형', laundry: '공용 세탁 가능', note: '겨울 바다를 조용히 즐기기 좋은 아담한 구조입니다.' },
      13: { rooms: 2, bedrooms: 1, beds: '퀸침대 1개 + 바닥요 2세트', bed: '있음', bathrooms: 1, cooking: '간단취사', kitchen: '전기포트, 전자레인지, 미니싱크대', maxGuests: '4인 권장', area: '약 24평형', laundry: '세탁기 없음', note: '겨울 리조트 이용을 전제로 한 따뜻한 난방 중심 숙소입니다.' },

      15: { rooms: 2, bedrooms: 1, beds: '더블침대 1개 + 바닥요 2세트', bed: '있음', bathrooms: 1, cooking: '가능', kitchen: '주방, 기본 조리도구', maxGuests: '4인 권장', area: '약 23평형', laundry: '세탁기 없음', note: '숲속 분위기의 조용한 숙소로 겨울 난방 만족도가 높은 편입니다.' },

    resorts.forEach(r => { r.stay = staySpecs[r.id]; });

    let reviews = [];

        const extraTag = resort.tags[j % resort.tags.length];
        const mergedTags = Array.from(new Set([...tpl.tags, extraTag])).slice(0, 4);
        reviews.push({
          id: reviewNo++,
          resortId: resort.id,
          resortName: resort.name,
          title: tpl.title,
          author: names[(idx + j) % names.length],

          image: resort.image,
          icon: resort.icon,
          recommend: 14 + ((idx * 9 + j * 7) % 78),
          views: 120 + ((idx * 67 + j * 41) % 860),
          empathy: 8 + ((idx * 11 + j * 13) % 95),
          tags: mergedTags,
          satisfaction: tpl.satisfaction,
          stayInfo: makeStayInfo(resort, idx, j),
          body: tpl.body,

          ]
        });
      });
    });
    resorts.forEach(r => { r.reviewCount = reviews.filter(rv => rv.resortId === r.id).length; });

    function makeStayInfo(resort, idx, j) {
      const spec = staySpecs[resort.id];
      const bedOptions = spec.bed === '없음' ? ['없음', '없음', '있음'] : ['있음', '있음', '확인 필요'];
      const cookingOptions = spec.cooking === '간단취사' ? ['간단취사', '가능', '확인 필요'] : ['가능', '가능', '간단취사'];
      const cleanOptions = ['깨끗함', '매우 깨끗함', '보통'];
      const noiseOptions = ['조용함', '보통', '조용함'];
      return {
        rooms: Math.max(1, spec.rooms - (j === 2 && spec.rooms > 1 ? 1 : 0)),
        bed: bedOptions[(idx + j) % bedOptions.length],
        bathrooms: spec.bathrooms,
        cooking: cookingOptions[(idx + j) % cookingOptions.length],
        guests: j === 0 ? spec.maxGuests : (j === 1 ? '2~3인 이용' : '3~4인 이용'),
        cleanliness: cleanOptions[(idx + j) % cleanOptions.length],
        noise: noiseOptions[(idx + j) % noiseOptions.length],
        memo: j === 0 ? '객실 구조와 기본 비품을 확인하기 쉬웠고 가족이 머물기 무난했습니다.' : (j === 1 ? '침구와 화장실 상태가 전반적으로 괜찮았습니다.' : '취사 가능 여부와 주차 정보가 이용 전에 특히 도움이 됐습니다.')
      };
    }

    const state = {
      screen: 'home',
      history: [],
      resortTab: '전체',
      resortFilter: '전체',
      reviewSort: 'latest',
      resortDetailSort: 'latest',
      query: '',
      reviewQuery: '',
      tagFilter: '',
      selectedResortId: null,
      selectedReviewId: null,
      likedReviews: new Set([reviews[0].id, reviews[9].id]),
      bookmarkedResorts: new Set([1, 7, 13]),
      bookmarkedReviews: new Set([reviews[2].id, reviews[7].id, reviews[28].id]),
      form: { satisfaction: '매우 만족', recommend: '추천' }
    };

    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const byId = id => document.getElementById(id);
    const resortById = id => resorts.find(r => r.id === Number(id));
    const reviewById = id => reviews.find(r => r.id === Number(id));

    function showToast(message) {
      const toast = byId('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1700);
    }

    function navigate(screen, opts = {}) {
      if (!opts.replace && state.screen !== screen) state.history.push(state.screen);
      state.screen = screen;
      if (opts.resortId) state.selectedResortId = Number(opts.resortId);
      if (opts.reviewId) state.selectedReviewId = Number(opts.reviewId);
      if (opts.tag) {
        state.tagFilter = opts.tag;
        state.reviewQuery = '';
        state.reviewSort = 'latest';
      }
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goBack() {
      const prev = state.history.pop();
      navigate(prev || 'home', { replace: true });
    }

    function setActiveScreen() {
      $$('.screen').forEach(s => s.classList.remove('active'));
      byId(`screen-${state.screen}`).classList.add('active');
      $$('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.nav === state.screen));
      if (['resort-detail','stay-info','review-detail','reviews'].includes(state.screen)) {
        $$('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.nav === 'resorts'));
      }
    }

    function header(title, right = '') {
      return `
        <div class="top-area">
          <div class="header-row">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1 class="page-title">${title}</h1>
            ${right || '<span style="width:40px"></span>'}
          </div>
        </div>`;
    }

    function homeHeader() {
      return `
        <div class="top-area">
          <div class="brand-row">
            <div class="brand">
              <div class="brand-logo">🏝️</div>
              <div>
                <h1 class="brand-title">휴양소 리뷰</h1>
                <p class="brand-sub">임직원 복지 휴양소 정보 · 후기</p>
              </div>
            </div>
            <button class="icon-btn" onclick="navigate('mypage')">🙂</button>
          </div>
          <div class="search-wrap">
            <label class="search-box">
              <span>🔎</span>
              <input id="homeSearch" value="${escapeHtml(state.query)}" placeholder="휴양소명, 지역명, 후기 제목, #해시태그 검색" oninput="state.query=this.value; renderHomeOnly();" />
            </label>
          </div>
        </div>`;
    }

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>'"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[m]));
    }

    function tagHtml(tags, mint = false) {
      return `<div class="tags">${tags.map(t => `<button class="tag ${mint ? 'mint' : ''}" onclick="navigate('reviews',{tag:'${t}'})">${t}</button>`).join('')}</div>`;
    }

    function imageDiv(type, icon, cls = '') {
      return `<div class="photo ${type} ${cls}" data-icon="${icon}"></div>`;
    }

    function statsLine(review) {
      return `<div class="meta"><span>👍 ${review.recommend}</span><span>👀 ${review.views}</span><span>💙 ${review.empathy}</span><span class="badge green">${review.satisfaction}</span></div>`;
    }

    function getFilteredResorts() {
      let list = resorts.slice();
      if (state.resortTab === '일반') list = list.filter(r => r.type === 'general');
      if (state.resortTab === '동계이벤트') list = list.filter(r => r.type === 'winter');
      if (state.resortFilter !== '전체') {
        list = list.filter(r => r.category === state.resortFilter || r.audience === state.resortFilter || (state.resortFilter === '동계이벤트' && r.type === 'winter'));
      }
      const q = normalize(state.query);
      if (q) list = list.filter(r => normalize([r.name, r.location, r.region, r.category, r.desc, r.stay ? Object.values(r.stay).join(' ') : '', ...r.tags].join(' ')).includes(q));
      return list;
    }

    function normalize(str) { return String(str || '').replace(/#/g, '').toLowerCase().trim(); }

    function getFilteredReviews({ resortId = null } = {}) {
      let list = reviews.slice();
      if (resortId) list = list.filter(r => r.resortId === Number(resortId));
      const q = normalize(state.reviewQuery || state.query);
      if (state.tagFilter) list = list.filter(r => r.tags.includes(state.tagFilter));
      if (q) list = list.filter(r => normalize([r.title, r.resortName, r.author, r.body, ...r.tags].join(' ')).includes(q));
      const sort = resortId ? state.resortDetailSort : state.reviewSort;
      list.sort((a,b) => {
        if (sort === 'recommend') return b.recommend - a.recommend;
        if (sort === 'views') return b.views - a.views;
        if (sort === 'empathy') return b.empathy - a.empathy;
        return b.date.localeCompare(a.date) || b.id - a.id;
      });
      return list;
    }

    function renderHomeOnly() {
      renderHome();
      byId('screen-home').classList.add('active');
      const input = byId('homeSearch');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }

    function renderHome() {

      const empathyReviews = reviews.slice().sort((a,b) => b.empathy - a.empathy).slice(0,3);
      const latestReviews = getFilteredReviews().slice(0,4);
      const recommendReviews = reviews.slice().sort((a,b) => b.recommend - a.recommend).slice(0,3);
      const tags = popularTags();
      const queryResults = state.query ? getSearchPreview() : '';

      byId('screen-home').innerHTML = `
        ${homeHeader()}
        <section class="hero-card">
          <h2>이번 주말, 어디로 쉬러 갈까요?</h2>
          <p>임직원이 남긴 실제 같은 후기와 추천 정보를 한눈에 확인하세요.</p>
          <div class="hero-actions">
            <button class="btn ghost" onclick="navigate('resorts')">휴양소 보기</button>
            <button class="btn" onclick="navigate('write')">후기 작성</button>
          </div>
        </section>

        <section class="section">
          <div class="chip-row">
            ${['전체','일반','동계이벤트'].map(tab => `<button class="chip ${state.resortTab===tab?'active':''}" onclick="state.resortTab='${tab}'; navigate('resorts')">${tab}</button>`).join('')}
            <button class="chip" onclick="navigate('reviews')">전체 후기</button>
          </div>
        </section>

        ${queryResults}

        <section class="section">
          <div class="section-head">
            <div><h2 class="section-title">인기 휴양소 TOP 3</h2><p class="section-desc">추천 수가 많은 순위입니다.</p></div>
            <button class="link-btn" onclick="navigate('resorts')">전체보기</button>
          </div>
          <div class="h-scroll">
            ${popularResorts.map((r,i) => `
              <button class="rank-card ${i===0?'first':''}" onclick="navigate('resort-detail',{resortId:${r.id}})">
                <span class="rank">${i+1}위</span>
                <div class="rank-icon">${r.icon}</div>
                <h3>${r.name}</h3>
                <p>${r.location} · 추천 ${r.recommendCount}</p>
              </button>`).join('')}
          </div>
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">추천 여행 테마</h2><p class="section-desc">상황에 맞는 휴양소를 골라보세요.</p></div></div>
          <div class="two-col">
            ${themeButtons()}
          </div>
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">공감이 많은 후기</h2><p class="section-desc">임직원들이 많이 공감한 글입니다.</p></div></div>
          ${empathyReviews.map(reviewCard).join('')}
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">최근 등록된 후기</h2><p class="section-desc">새로 올라온 휴양소 이용 후기입니다.</p></div><button class="link-btn" onclick="navigate('reviews')">더보기</button></div>
          ${latestReviews.map(reviewCard).join('')}
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">추천이 많은 후기</h2><p class="section-desc">추천을 많이 받은 인기 글입니다.</p></div></div>
          ${recommendReviews.map(reviewCard).join('')}
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">인기 해시태그</h2><p class="section-desc">키워드를 누르면 후기 목록으로 이동합니다.</p></div></div>
          <div class="chip-row">${tags.map(t => `<button class="chip small" onclick="navigate('reviews',{tag:'${t}'})">${t}</button>`).join('')}</div>
        </section>`;

    function getSearchPreview() {
      const resortsFound = getFilteredResorts().slice(0,2);
      const reviewsFound = getFilteredReviews().slice(0,2);

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">검색 결과</h2><p class="section-desc">“${escapeHtml(state.query)}”와 관련된 결과입니다.</p></div></div>
          ${resortsFound.length ? resortsFound.map(resortMiniCard).join('') : ''}
          ${reviewsFound.length ? reviewsFound.map(reviewCard).join('') : ''}
          ${!resortsFound.length && !reviewsFound.length ? `<div class="empty"><span class="big">🔎</span>검색 결과가 없습니다.</div>` : ''}
        </section>`;
    }

    function themeButtons() {
      const themes = [
        ['아이와 함께 가기 좋은 휴양소','가족추천','👨‍👩‍👧‍👦'],
        ['오션뷰가 좋은 휴양소','바다','🌊'],
        ['겨울에 가기 좋은 휴양소','동계이벤트','⛄'],
        ['가볍게 주말에 다녀오기 좋은 휴양소','주말여행','🚗'],
        ['부모님과 가기 좋은 휴양소','가족추천','🌿']
      ];

        <button class="stat-card" onclick="applyTheme('${filter}')">
          <strong>${icon}</strong><span>${label}</span>
        </button>`).join('');

    function applyTheme(filter) {
      state.resortTab = filter === '동계이벤트' ? '동계이벤트' : '전체';
      state.resortFilter = ['바다','동계이벤트','가족추천'].includes(filter) ? filter : '전체';
      state.query = filter === '주말여행' ? '주말' : '';
      navigate('resorts');
    }

    function popularTags() {
      const counts = new Map();
      reviews.forEach(r => r.tags.forEach(t => counts.set(t, (counts.get(t) || 0) + 1)));
      return Array.from(counts.entries()).sort((a,b) => b[1] - a[1]).slice(0,10).map(x => x[0]);
    }

    function resortMiniCard(r) {
      return `
        <button class="mini-card" onclick="navigate('resort-detail',{resortId:${r.id}})">

            <div style="margin-top:7px;">${r.tags.slice(0,2).map(t => `<span class="badge blue">${t}</span>`).join(' ')}</div>
          </div>

    }

    function resortCard(r) {
      return `
        <article class="card resort-card">
          <button style="width:100%; text-align:left; background:transparent; padding:0;" onclick="navigate('resort-detail',{resortId:${r.id}})">

              <div>
                <h3>${r.name}</h3>
                <div class="meta"><span>📍 ${r.location}</span><span>👍 평균 ${r.recommendCount}</span><span>💬 후기 ${r.reviewCount}</span></div>
              </div>

    function reviewCard(rv) {
      const liked = state.likedReviews.has(rv.id);
      const bookmarked = state.bookmarkedReviews.has(rv.id);
      return `
        <article class="card review-card">
          <button style="background:transparent;padding:0;" onclick="openReview(${rv.id})">${imageDiv(rv.image, rv.icon)}</button>
          <div>
            <button style="background:transparent;text-align:left;padding:0;width:100%;" onclick="openReview(${rv.id})">
              <div class="meta"><span>No.${rv.id}</span><span>${rv.resortName}</span></div>
              <h3>${rv.title}</h3>
              <div class="meta"><span>${rv.author}</span><span>${rv.date}</span></div>
            </button>
            <div style="margin-top:7px;">${statsLine(rv)}</div>
            ${rv.stayInfo ? '<div style="margin-top:6px;"><span class="badge blue">🏠 숙소정보 포함</span></div>' : ''}

          </div>
          <div class="actions">
            <button class="${liked ? 'active' : ''}" onclick="toggleLike(${rv.id})">💙 공감 ${rv.empathy}</button>

            <button onclick="shareItem()">🔗 공유</button>
          </div>
        </article>`;
    }

    function openReview(id) {
      const rv = reviewById(id);
      rv.views += 1;
      navigate('review-detail', { reviewId: id });
    }

    function toggleLike(id) {
      const rv = reviewById(id);
      if (state.likedReviews.has(id)) {
        state.likedReviews.delete(id);
        rv.empathy = Math.max(0, rv.empathy - 1);
        showToast('공감을 취소했습니다.');
      } else {
        state.likedReviews.add(id);
        rv.empathy += 1;
        showToast('공감했습니다.');
      }
      render();
    }

    function toggleReviewBookmark(id) {
      if (state.bookmarkedReviews.has(id)) {
        state.bookmarkedReviews.delete(id);
        showToast('후기 북마크를 해제했습니다.');
      } else {
        state.bookmarkedReviews.add(id);
        showToast('후기를 북마크했습니다.');
      }
      render();
    }

    function toggleResortBookmark(id) {
      if (state.bookmarkedResorts.has(id)) {
        state.bookmarkedResorts.delete(id);
        showToast('휴양소 북마크를 해제했습니다.');
      } else {
        state.bookmarkedResorts.add(id);
        showToast('휴양소를 북마크했습니다.');
      }
      render();
    }

            <button class="icon-btn" onclick="toggleResortBookmark(${r.id})">${state.bookmarkedResorts.has(r.id) ? '🔖' : '🤍'}</button>

    function infoRow(icon, title, text) {
      return `<div class="info-row"><div style="font-size:22px;line-height:1;">${icon}</div><div><b>${title}</b><span>${text}</span></div></div>`;
    }

    function stayCard(icon, title, text) {
      return `<div class="stay-card"><span class="ico">${icon}</span><b>${title}</b><span>${text}</span></div>`;
    }

    function stayInfoBlock(info) {
      if (!info) return `<div class="empty"><span class="big">🏠</span>작성자가 숙소 정보를 따로 입력하지 않았습니다.</div>`;
      return `<div class="stay-grid">
        ${stayCard('🚪','방 개수', info.rooms ? `${info.rooms}개` : '선택 안함')}
        ${stayCard('🛏️','침대', info.bed || '선택 안함')}
        ${stayCard('🚿','화장실', info.bathrooms ? `${info.bathrooms}개` : '선택 안함')}
        ${stayCard('🍳','취사', info.cooking || '선택 안함')}
        ${stayCard('👥','이용 인원', info.guests || '선택 안함')}
        ${stayCard('✨','청결 체감', info.cleanliness || '선택 안함')}
      </div>${info.noise || info.memo ? `<div class="stay-note">${info.noise ? `소음 체감: ${info.noise}<br>` : ''}${info.memo ? `추가 메모: ${escapeHtml(info.memo)}` : ''}</div>` : ''}`;
    }

    function getStayStats(resortId) {
      const items = reviews.filter(rv => rv.resortId === Number(resortId) && rv.stayInfo);
      const pct = fn => items.length ? Math.round(items.filter(fn).length / items.length * 100) : 0;
      const mode = arr => {
        const counts = new Map();
        arr.filter(v => v !== undefined && v !== null && v !== '' && v !== '선택 안함').forEach(v => counts.set(v, (counts.get(v) || 0) + 1));
        return Array.from(counts.entries()).sort((a,b) => b[1] - a[1])[0]?.[0] || '정보 없음';
      };
      return {
        count: items.length,
        rooms: mode(items.map(x => x.stayInfo.rooms ? `${x.stayInfo.rooms}개` : '')),
        bathrooms: mode(items.map(x => x.stayInfo.bathrooms ? `${x.stayInfo.bathrooms}개` : '')),
        bedPct: pct(x => x.stayInfo.bed === '있음'),
        cookingPct: pct(x => ['가능','간단취사'].includes(x.stayInfo.cooking)),
        quietPct: pct(x => x.stayInfo.noise === '조용함'),
        cleanPct: pct(x => ['깨끗함','매우 깨끗함'].includes(x.stayInfo.cleanliness)),
        notes: items.map(x => x.stayInfo.memo).filter(Boolean).slice(0, 4),
        items
      };
    }

      return `<div class="progress-row"><div class="progress-head"><span>${label}</span><span>${percent}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div><div class="form-help">${desc}</div></div>`;
    }

          <div class="two-col">
            <div class="stat-card"><strong>${stats.rooms}</strong><span>가장 많이 선택된 방 개수</span></div>

          ${progressRow('취사 가능 응답', stats.cookingPct, '가능 또는 간단취사로 선택한 비율입니다.')}
          ${progressRow('조용하다는 응답', stats.quietPct, '소음 체감을 조용함으로 선택한 비율입니다.')}
          ${progressRow('깨끗하다는 응답', stats.cleanPct, '청결 체감을 깨끗함 이상으로 선택한 비율입니다.')}
        </section>

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">숙소 정보 메모</h2><p class="section-desc">후기에 자유 입력된 추가 정보입니다.</p></div></div>
          ${stats.notes.length ? stats.notes.map(n => `<div class="stay-note">${escapeHtml(n)}</div>`).join('') : `<div class="empty">아직 입력된 숙소 메모가 없습니다.</div>`}

    }

    function optionHtml(items) {
      return items.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function parseCount(value) {
      if (!value || value === '선택 안함') return null;
      if (value.includes('3개 이상')) return 3;
      return Number(value.replace(/[^0-9]/g, '')) || null;
    }

    function collectStayInfo() {
      const rooms = $('#writeRooms')?.value || '선택 안함';
      const bed = $('#writeBed')?.value || '선택 안함';
      const bathrooms = $('#writeBathrooms')?.value || '선택 안함';
      const cooking = $('#writeCooking')?.value || '선택 안함';
      const guests = $('#writeGuests')?.value || '선택 안함';
      const cleanliness = $('#writeCleanliness')?.value || '선택 안함';
      const noise = $('#writeNoise')?.value || '선택 안함';
      const memo = ($('#writeStayMemo')?.value || '').trim();
      const values = [rooms, bed, bathrooms, cooking, guests, cleanliness, noise];
      if (values.every(v => v === '선택 안함') && !memo) return null;
      return {
        rooms: parseCount(rooms),
        bed: bed === '선택 안함' ? '' : bed,
        bathrooms: parseCount(bathrooms),
        cooking: cooking === '선택 안함' ? '' : cooking,
        guests: guests === '선택 안함' ? '' : guests,
        cleanliness: cleanliness === '선택 안함' ? '' : cleanliness,
        noise: noise === '선택 안함' ? '' : noise,
        memo
      };
    }

    function renderWrite() {

            <label class="form-label">휴양소 선택</label>
            <select id="writeResort" class="form-select">${resorts.map(r => `<option value="${r.id}" ${state.selectedResortId===r.id?'selected':''}>${r.name}</option>`).join('')}</select>

            <input id="writeTitle" class="form-input" placeholder="예: 가족과 함께 다녀오기 좋았습니다" />
            <label class="form-label">사진 업로드</label>
            <div class="upload-box" onclick="showToast('사진 업로드 영역입니다.')"><div><div style="font-size:32px;">📷</div><b>사진을 추가해보세요</b><br><span>실제 저장 없이 UI만 동작합니다.</span></div></div>
            <label class="form-label">본문 작성</label>
            <textarea id="writeBody" class="form-textarea" placeholder="휴양소 이용 경험, 시설, 주변 관광지, 추천 포인트를 적어주세요."></textarea>
            <label class="form-label">해시태그 입력</label>

            <label class="form-label">만족도 선택</label>
            <div class="radio-row" id="satisfactionPills">
              ${['매우 만족','만족','보통','아쉬움'].map(v => `<button class="radio-pill ${state.form.satisfaction===v?'active':''}" onclick="state.form.satisfaction='${v}'; renderWrite();">${v}</button>`).join('')}

            <label class="form-label">추천 여부</label>
            <div class="radio-row">

            </div>

            <div class="stay-note" style="margin-top:18px;">
              <b>숙소 정보 추가 입력</b><br>필수 항목은 아니며, 입력하면 휴양소별 숙소 통계 화면에 반영되는 것처럼 표시됩니다.
            </div>
            <label class="form-label">방 개수</label>
            <select id="writeRooms" class="form-select">${optionHtml(['선택 안함','1개','2개','3개 이상'])}</select>
            <label class="form-label">침대 여부</label>
            <select id="writeBed" class="form-select">${optionHtml(['선택 안함','있음','없음','확인 필요'])}</select>
            <label class="form-label">화장실 개수</label>
            <select id="writeBathrooms" class="form-select">${optionHtml(['선택 안함','1개','2개','3개 이상'])}</select>
            <label class="form-label">취사 가능 여부</label>
            <select id="writeCooking" class="form-select">${optionHtml(['선택 안함','가능','간단취사','불가','확인 필요'])}</select>
            <label class="form-label">이용 인원</label>
            <select id="writeGuests" class="form-select">${optionHtml(['선택 안함','1~2인','2~3인','3~4인','4인 이상'])}</select>
            <label class="form-label">청결 체감</label>

            <button class="btn primary full" style="margin-top:18px;" onclick="submitReview()">작성 완료</button>
          </div></div>

    }

    function submitReview() {
      const resortId = Number($('#writeResort').value);
      const resort = resortById(resortId);
      const title = $('#writeTitle').value.trim() || '새로 작성한 휴양소 후기입니다';
      const body = $('#writeBody').value.trim() || '휴양소 이용 경험을 바탕으로 작성한 후기입니다. 실제 저장은 되지 않지만 현재 화면에서는 등록된 것처럼 표시됩니다.';
      let tags = $('#writeTags').value.trim().split(/\s+/).filter(Boolean).map(t => t.startsWith('#') ? t : `#${t}`);
      if (!tags.length) tags = resort.tags.slice(0,3);
      const stayInfo = collectStayInfo();
      const newReview = {
        id: reviewNo++, resortId, resortName: resort.name, title, author: '홍길동', date: '2026.05.18', image: resort.image, icon: resort.icon,
        recommend: state.form.recommend === '추천' ? 1 : 0, views: 1, empathy: 0, tags: tags.slice(0,4), satisfaction: state.form.satisfaction, stayInfo, body,
        comments: [{ author: '시스템', text: '작성 완료된 것처럼 표시되는 더미 댓글입니다.', like: 0 }]
      };
      reviews.unshift(newReview);
      resort.reviewCount += 1;
      state.selectedReviewId = newReview.id;
      showToast('후기가 등록되었습니다.');
      navigate('review-detail', { reviewId: newReview.id });
    }

        ${header('북마크', '<button class="icon-btn" onclick="showToast(\'북마크가 동기화된 것처럼 표시됩니다.\')">🔄</button>')}
        <div class="chip-row">
          <button class="chip ${tab==='resorts'?'active':''}" onclick="renderBookmarks.tab='resorts'; renderBookmarks();">휴양소 북마크</button>

        <section class="profile">

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">내가 작성한 글</h2></div></div>
          ${myReviews.length ? myReviews.map(reviewCard).join('') : `<div class="empty"><span class="big">✍️</span>아직 작성한 후기가 없습니다.</div>`}

          <div class="section-head"><div><h2 class="section-title">내가 북마크한 글</h2></div></div>
          ${bookmarked.map(reviewCard).join('') || `<div class="empty">북마크한 글이 없습니다.</div>`}

          ${recentResorts.map(resortMiniCard).join('')}

        <section class="section">
          <div class="section-head"><div><h2 class="section-title">설정 메뉴</h2></div></div>

    }

    function render() {
      if (state.screen === 'home') renderHome();
      if (state.screen === 'resorts') renderResorts();
      if (state.screen === 'resort-detail') renderResortDetail();

      if (state.screen === 'bookmarks') renderBookmarks();
      if (state.screen === 'mypage') renderMypage();
      setActiveScreen();
    }

    $$('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const nav = btn.dataset.nav;
        state.tagFilter = nav === 'resorts' ? state.tagFilter : '';
        navigate(nav);
      });
    });

    render();

    // session 02 패턴: top-area 뒤 콘텐츠를 .scroll-body로 자동 래핑
    (function setupScrollPattern() {
      function wrap(screenEl) {
        if (!screenEl.children.length) return;
        if (screenEl.querySelector(':scope > .scroll-body')) return;
        const topArea = screenEl.querySelector(':scope > .top-area');
        if (!topArea) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'scroll-body';
        let next = topArea.nextSibling;
        while (next) {
          const cur = next;
          next = next.nextSibling;
          wrapper.appendChild(cur);
        }
        if (wrapper.children.length) screenEl.appendChild(wrapper);
      }
      function wrapAll() {
        document.querySelectorAll('.screen').forEach(wrap);
      }
      const observer = new MutationObserver(() => requestAnimationFrame(wrapAll));
      document.querySelectorAll('.screen').forEach(screen => {
        observer.observe(screen, { childList: true });
      });
      wrapAll();
    })();

    // 스크롤 안내 카드 자동 해제
    (function(){
      const hint = document.getElementById('scrollHint');
      if (!hint) return;
      let dismissed = false;
      function dismiss(){
        if (dismissed) return;
        dismissed = true;
        hint.classList.add('hidden');
        setTimeout(()=>hint.remove(), 400);
      }
      hint.addEventListener('click', dismiss);
      function bindScroll(el){
        if (!el) return;
        el.addEventListener('scroll', dismiss, { once: true, passive: true });
        el.addEventListener('wheel', dismiss, { once: true, passive: true });
        el.addEventListener('touchmove', dismiss, { once: true, passive: true });
      }
      // 동적으로 추가되는 scroll-body 모두 바인딩
      const obs = new MutationObserver(() => {
        document.querySelectorAll('.scroll-body').forEach(bindScroll);
      });
      obs.observe(document.body, { childList: true, subtree: true });
      document.querySelectorAll('.scroll-body').forEach(bindScroll);
    })();
  </script>
