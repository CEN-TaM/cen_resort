<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Think and Make · 학습조직 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #1d6cff;
    --brand-deep: #0a3fb5;
    --ink: #0f172a;
    --muted: #64748b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #eef3fb url('assets/bg.png') center / cover no-repeat fixed;
    font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    overflow: hidden;
  }

  /* Letterbox stage scales the fixed 1920x1080 canvas */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas {
    width: 1920px;
    height: 1080px;
    flex-shrink: 0;
    position: relative;
    transform-origin: center center;
    background: transparent;
    overflow: hidden;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 96px 128px 112px;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 1600px) {
    .content { padding: 88px 96px 104px; }
  }
  @media (max-width: 1500px) {
    .content { padding: 80px 80px 96px; }
  }
  @media (max-width: 1366px) {
    .content { padding: 72px 64px 88px; }
  }

  .heading {
    margin-bottom: 96px;
  }
  .eyebrow {
    color: var(--brand);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: 0.005em;
    margin-bottom: 28px;
  }
  .eyebrow .ko { font-family: 'Noto Sans KR', sans-serif; }
  h1 {
    margin: 0;
    font-weight: 700;
    font-size: 96px;
    line-height: 1.05;
    letter-spacing: -0.035em;
    color: var(--ink);
  }
  h1 .sub {
    display: block;
    font-weight: 400;
    font-size: 30px;
    color: var(--muted);
    margin-top: 28px;
    letter-spacing: -0.005em;
  }

  /* dock */
  .dock {
    background: rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 44px;
    padding: 36px 48px;
    display: inline-flex;
    align-items: center;
    gap: 36px;
    align-self: flex-start;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: inherit;
  }

  .icon {
    width: 144px;
    height: 144px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 240ms cubic-bezier(.34,1.56,.64,1), background 240ms ease;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 56px;
    color: rgba(255,255,255,0.96);
    letter-spacing: -0.01em;
  }
  .app:hover .icon {
    transform: translateY(-14px) scale(1.06);
  }
  .app:hover .label {
    color: var(--brand-deep);
  }

  .label {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: rgba(15, 23, 42, 0.78);
    letter-spacing: 0.01em;
    white-space: nowrap;
    transition: color 180ms ease;
    white-space: nowrap;
  }

  /* 파스텔 그라데이션 5종 (기본 / 호버 시 채도·명도 진해진 버전) */
  .icon-1 { background: linear-gradient(135deg, #FFD3DD 0%, #FFA8BD 100%); } /* pink */
  .icon-2 { background: linear-gradient(135deg, #FFE6BD 0%, #FFC889 100%); } /* peach */
  .icon-3 { background: linear-gradient(135deg, #D2F1DC 0%, #9CDDB6 100%); } /* mint */
  .icon-4 { background: linear-gradient(135deg, #D6E4FB 0%, #A8C2F0 100%); } /* sky */
  .icon-5 { background: linear-gradient(135deg, #E3D7F3 0%, #B9A6E0 100%); } /* lilac */

  .app:hover .icon-1 { background: linear-gradient(135deg, #FF9FB0 0%, #FF5577 100%); }
  .app:hover .icon-2 { background: linear-gradient(135deg, #FFC890 0%, #FF9A40 100%); }
  .app:hover .icon-3 { background: linear-gradient(135deg, #9FE0B8 0%, #4FC07A 100%); }
  .app:hover .icon-4 { background: linear-gradient(135deg, #A8C2F0 0%, #5C8FE0 100%); }
  .app:hover .icon-5 { background: linear-gradient(135deg, #BFA8E8 0%, #8064C4 100%); }
  .icon-final { background: linear-gradient(135deg, #1d6cff 0%, #0a3fb5 100%); }
  .app:hover .icon-final { background: linear-gradient(135deg, #0a3fb5 0%, #062a7a 100%); }
  .icon-soon {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
  }

  /* footer */
  .foot {
    margin-top: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 48px;
  }
  .legend {
    color: var(--muted);
    font-size: 22px;
    line-height: 1.7;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-left: 10px;
  }
  .legend strong { color: var(--ink); font-weight: 600; }
  .legend .check {
    width: 28px;
    height: 28px;
    flex: 0 0 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #9CDDB6 0%, #5DBE85 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px -2px rgba(93, 190, 133, 0.45);
  }
  .legend .check svg { width: 16px; height: 16px; display: block; }

  /* ============ 반응형: 태블릿·모바일 (고정 캔버스 → 자연 재배치) ============ */
  @media (max-width: 900px) {
    html, body { height: auto; overflow-x: hidden; overflow-y: auto; }
    body { background-attachment: scroll; }

    /* 스케일 캔버스를 해제하고 일반 흐름으로 전환 */
    .stage { position: static; inset: auto; display: block; }
    .canvas {
      width: 100% !important;
      height: auto !important;
      min-height: 100vh;
      transform: none !important;
    }
    .content {
      width: 100%;
      height: auto;
      min-height: 100vh;
      padding: clamp(40px, 8vw, 72px) clamp(20px, 6vw, 56px) clamp(48px, 9vw, 88px);
      justify-content: flex-start;
    }

    .heading { margin-bottom: clamp(40px, 9vw, 72px); }
    .eyebrow { font-size: clamp(16px, 4.4vw, 26px); margin-bottom: clamp(12px, 3vw, 22px); }
    h1 { font-size: clamp(34px, 9vw, 68px); }
    h1 .sub { font-size: clamp(15px, 3.8vw, 24px); margin-top: clamp(14px, 3vw, 22px); }

    /* 도크: 가로 한 줄 → 3열 그리드 */
    .dock {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(16px, 4vw, 32px);
      padding: clamp(20px, 5vw, 36px);
      border-radius: 32px;
      width: 100%;
      align-self: stretch;
      justify-items: center;
    }
    .app { gap: clamp(8px, 2vw, 16px); }
    .icon {
      width: clamp(72px, 19vw, 130px);
      height: clamp(72px, 19vw, 130px);
      font-size: clamp(28px, 7.5vw, 52px);
    }
    .icon-soon { font-size: clamp(12px, 3.2vw, 20px); }
    .label { font-size: clamp(13px, 3.2vw, 20px); }

    .foot { margin-top: clamp(28px, 7vw, 48px); }
    .legend {
      white-space: normal;
      font-size: clamp(13px, 3.4vw, 18px);
      align-items: flex-start;
      line-height: 1.55;
    }
  }

  /* 아주 좁은 화면(폰 세로): 아이콘 2열 */
  @media (max-width: 480px) {
    .dock { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="canvas" id="canvas" data-screen-label="01 포털 메인">
      <div class="content">
        <div class="heading">
          <div class="eyebrow">Think and Make : <span class="ko">띵앤맥</span></div>
          <h1>
            학습조직 프로토타입
            <span class="sub">매주 진행한 활동 결과물을 한 곳에서 살펴보세요.</span>
          </h1>
        </div>

        <div class="dock" role="list">
          <a class="app" role="listitem" href="prototypes/session-01.html">
            <div class="icon icon-1">1</div>
            <div class="label">2026.04.15</div>
          </a>

          <a class="app" role="listitem" href="prototypes/session-02.html">
            <div class="icon icon-2">2</div>
            <div class="label">2026.05.13</div>
          </a>

          <a class="app" role="listitem" href="prototypes/session-03.html">
            <div class="icon icon-3">3</div>
            <div class="label">2026.05.20</div>
          </a>

          <a class="app" role="listitem" href="prototypes/session-04.html">
            <div class="icon icon-4">4</div>
            <div class="label">2026.05.27</div>
          </a>

          <a class="app" role="listitem" href="prototypes/session-05.html">
            <div class="icon icon-5">5</div>
            <div class="label">2026.06.10</div>
          </a>

          <a class="app" role="listitem" href="prototypes/final.html">
            <div class="icon icon-final"><span class="icon-soon">최종<br>시안</span></div>
            <div class="label">최종시안</div>
          </a>
        </div>

        <div class="foot">
          <div class="legend">
            <span class="check" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12.5 10 17.5 19 7"/></svg>
            </span>
            각 아이콘을 클릭하면 해당 회차에 제작한 <strong>프로토타입</strong>을 바로 확인할 수 있습니다.
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Fit 1920x1080 canvas into viewport while preserving aspect ratio.
  (function () {
    const canvas = document.getElementById('canvas');
    const W = 1920, H = 1080;
    const mobile = window.matchMedia('(max-width: 900px)');
    function fit() {
      // 좁은 화면에서는 CSS 반응형 레이아웃이 담당 (스케일 해제)
      if (mobile.matches) {
        canvas.style.transform = 'none';
        return;
      }
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const s = Math.min(vw / W, vh / H);
      canvas.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  })();
</script>
</body>
</html>
